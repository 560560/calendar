<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Май 2026 - Интерактивный график</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            min-width: 320px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 2vw;
            min-height: 100vh;
        }

        .calendar-container {
            background-color: white;
            padding: 3vw;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 2px solid #333;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: clamp(20px, 7vw, 42px);
            font-weight: bold;
            margin-bottom: clamp(8px, 2vw, 15px);
            letter-spacing: clamp(2px, 1vw, 8px);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: clamp(6px, 2vw, 10px);
            margin-bottom: clamp(8px, 2vw, 12px);
            flex-wrap: wrap;
            align-items: center;
        }

        .color-selector {
            display: flex;
            gap: clamp(4px, 1.5vw, 8px);
            align-items: center;
        }

        .color-selector span {
            font-weight: bold;
            font-size: clamp(12px, 3.5vw, 16px);
        }

        .color-btn {
            width: clamp(32px, 10vw, 50px);
            height: clamp(32px, 10vw, 50px);
            border: 2px solid #333;
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .color-btn:active {
            transform: scale(1.1);
        }

        .color-btn.active {
            border: 3px solid #000;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.5);
        }

        .color-btn.blue {
            background-color: #66ccff;
        }

        .color-btn.pink {
            background-color: #ff99cc;
        }

        .reset-btn {
            padding: clamp(6px, 2vw, 10px) clamp(10px, 3vw, 16px);
            font-size: clamp(12px, 3.5vw, 14px);
            font-weight: bold;
            background-color: #ff3366;
            color: white;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            border-radius: 4px;
        }

        .reset-btn:active {
            background-color: #cc0033;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background-color: black;
            color: white;
            font-weight: bold;
            font-size: clamp(7px, 2.2vw, 11px);
            text-transform: uppercase;
        }

        .weekday {
            padding: clamp(4px, 1.2vw, 8px) 1px;
            text-align: center;
            border-right: 1px solid white;
        }

        .weekday:last-child {
            border-right: none;
        }

        .weekday.saturday,
        .weekday.sunday {
            background-color: #ff3366;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border: 2px solid #333;
            border-top: none;
        }

        .day {
            aspect-ratio: 1 / 1;
            border: 1px solid #999;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
        }

        .day-number {
            font-size: clamp(16px, 5.5vw, 36px);
            font-weight: bold;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .day.saturday .day-number,
        .day.sunday .day-number {
            color: #ff3366;
        }

        .day.empty {
            background-color: white;
        }

        .day-half {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
            cursor: pointer;
            z-index: 5;
        }

        .day-half:active {
            opacity: 0.7;
        }

        .day-half.left {
            left: 0;
        }

        .day-half.right {
            right: 0;
        }

        .instruction {
            text-align: center;
            margin-bottom: clamp(6px, 2vw, 10px);
            font-size: clamp(10px, 3vw, 14px);
            color: #666;
            line-height: 1.3;
        }

        @media (min-width: 600px) {
            body {
                padding: 20px;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .calendar-container {
                padding: 20px;
            }
        }

        @media print {
            .controls,
            .instruction {
                display: none;
            }
        }
    </style>
</head>
<body>

            <div class="color-selector">
                <span>Цвет:</span>
                <div class="color-btn blue active" data-color="blue"></div>
                <div class="color-btn pink" data-color="pink"></div>
            </div>
            <button class="reset-btn" onclick="resetCalendar()">Очистить</button>
        </div>
        
        <div class="weekdays">

            <div class="weekday">СР</div>

            <div class="weekday">ПТ</div>
            <div class="weekday saturday">СБ</div>
            <div class="weekday sunday">ВС</div>
        </div>

        <div class="calendar" id="calendar">
            <!-- Май 2026: 1 мая - пятница -->

            <div class="day empty"></div>
            <div class="day empty"></div>
            <div class="day empty"></div>

                <div class="day-half left"></div>
                <div class="day-half right"></div>
                <span class="day-number">1</span>
            </div>

                <span class="day-number">4</span>
            </div>
            <div class="day" data-day="5">
                <div class="day-half left"></div>
                <div class="day-half right"></div>
                <span class="day-number">5</span>
            </div>
            <div class="day" data-day="6">
                <div class="day-half left"></div>
                <div class="day-half right"></div>

            </div>
            <div class="day" data-day="7">

            <div class="day" data-day="8">

                <div class="day-half right"></div>
                <span class="day-number">8</span>
            </div>
            <div class="day saturday" data-day="9">
                <div class="day-half left"></div>
                <div class="day-half right"></div>
                <span class="day-number">9</span>

            <div class="day sunday" data-day="10">
                <div class="day-half left"></div>

            </div>

            <!-- Неделя 3 -->
            <div class="day" data-day="11">
                <div class="day-half left"></div>
                <div class="day-half right"></div>
                <span class="day-number">11</span>
            </div>
            <div class="day" data-day="12">
                <div class="day-half left"></div>
                <div class="day-half right"></div>
                <span class="day-number">12</span>
            </div>
            <div class="day" data-day="13">
                <div class="day-half left"></div>
                <div class="day-half right"></div>
                <span class="day-number">13</span>
            </div>
            <div class="day" data-day="14">
                <div class="day-half left"></div>
                <div class="day-half right"></div>
                <span class="day-number">14</span>
            </div>
            <div class="day" data-day="15">
                <div class="day-half left"></div>
                <div class="day-half right"></div>
                <span class="day-number">15</span>
            </div>
            <div class="day saturday" data-day="16">
                <div class="day-half left"></div>
                <div class="day-half right"></div>
                <span class="day-number">16</span>
            </div>
            <div class="day sunday" data-day="17">
                <div class="day-half left"></div>

            </div>

            <!-- Неделя 4 -->
            <div class="day" data-day="18">

            <div class="day" data-day="19">

            <div class="day" data-day="20">

            <div class="day" data-day="21">

            <div class="day" data-day="22">

            <div class="day saturday" data-day="23">

            <!-- Неделя 5 -->
            <div class="day" data-day="25">

            </div>
            <div class="day" data-day="26">
                <div class="day-half left"></div>

            </div>
            <div class="day" data-day="27">

            </div>
            <div class="day" data-day="28">

            </div>
            <div class="day" data-day="29">

            </div>
            <div class="day saturday" data-day="30">
                <div class="day-half left"></div>
                <div class="day-half right"></div>

            </div>
            <div class="day sunday" data-day="31">
                <div class="day-half left"></div>
                <div class="day-half right"></div>
                <span class="day-number">31</span>
            </div>
        </div>
    </div>

    <script>
        let selectedColor = 'blue';

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedColor = this.dataset.color;
            });
        });

        document.querySelectorAll('.day-half').forEach(half => {
            half.addEventListener('click', function() {
                const currentColor = this.style.backgroundColor;
                const blueColor = 'rgb(102, 204, 255)';
                const pinkColor = 'rgb(255, 153, 204)';
                
                if ((selectedColor === 'blue' && currentColor === blueColor) ||
                    (selectedColor === 'pink' && currentColor === pinkColor)) {
                    this.style.backgroundColor = '';
                } else {
                    this.style.backgroundColor = selectedColor === 'blue' ? '#66ccff' : '#ff99cc';
                }
            });
        });

        function resetCalendar() {
            document.querySelectorAll('.day-half').forEach(half => {
                half.style.backgroundColor = '';
            });
        }
    </script>
</body>
</html>
